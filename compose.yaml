name: stock-project

x-db-env: &db-env
  DB_HOST: db
  DB_PORT: "3306"
  DB_NAME: stock_project
  DB_USER: stock_app
  DB_PASSWORD: stock_app
  DATABASE_URL: "mysql://stock_app:stock_app@db:3306/stock_project?serverVersion=10.11.0-MariaDB&charset=utf8mb4"

x-python-job-env: &python-job-env
  <<: *db-env
  PROJECT_ROOT: /app
  YFINANCE_CACHE_DIR: /app/var/cache/yfinance

services:
  db:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: stock_project
      MARIADB_USER: stock_app
      MARIADB_PASSWORD: stock_app
      MARIADB_ROOT_PASSWORD: stock_root
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql

  migrate:
    build:
      context: .
      dockerfile: docker/web-cli/Dockerfile
    environment:
      <<: *db-env
      APP_ENV: prod
      APP_SECRET: docker-local-change-me
      PROJECT_ROOT: /app
      PYTHON_BIN: python3
    depends_on:
      db:
        condition: service_healthy
    profiles: ["setup"]

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    environment:
      <<: *db-env
      APP_ENV: prod
      APP_SECRET: docker-local-change-me
      PROJECT_ROOT: /app
      PYTHON_BIN: python3
      STOCK_WEB_JOB_LAUNCH_ENABLED: "0"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - web_var:/app/web/var

  intake:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    environment:
      <<: *python-job-env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - yfinance_cache:/app/var/cache/yfinance
    profiles: ["jobs"]

  sepa:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    command: ["python", "stock-system/scripts/run_sepa.py", "--mode=db", "--source=all"]
    environment:
      <<: *python-job-env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - yfinance_cache:/app/var/cache/yfinance
    profiles: ["jobs"]

  epa:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    command: ["python", "stock-system/scripts/run_epa.py", "--mode=db", "--source=all"]
    environment:
      <<: *python-job-env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - yfinance_cache:/app/var/cache/yfinance
    profiles: ["jobs"]

  pipeline:
    build:
      context: .
      dockerfile: docker/python-full/Dockerfile
    command: ["python", "stock-system/scripts/run_pipeline.py", "--mode=db", "--source=all"]
    environment:
      <<: *python-job-env
      MODELS_DIR: /app/models
      KRONOS_DIR: /app/repos/Kronos
      FINGPT_DIR: /app/repos/FinGPT
      HF_HOME: /app/.hf-cache
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - type: bind
        source: ${STOCK_MODELS_DIR:-./models}
        target: /app/models
        read_only: true
      - type: bind
        source: ${STOCK_KRONOS_DIR:-./repos/Kronos}
        target: /app/repos/Kronos
        read_only: true
      - type: bind
        source: ${STOCK_FINGPT_DIR:-./repos/FinGPT}
        target: /app/repos/FinGPT
        read_only: true
      - yfinance_cache:/app/var/cache/yfinance
      - hf_cache:/app/.hf-cache
    profiles: ["jobs"]

volumes:
  db_data:
  hf_cache:
  yfinance_cache:
  web_var:
